<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | The Future is Now</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.1);
            --bg: #020617; /* Deep Space Blue */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #f8fafc; display: flex; justify-content: center; }

        .app-container {
            width: 100%; max-width: 480px; background: var(--bg); min-height: 100vh;
            position: relative; padding-bottom: 120px;
        }

        /* --- VISUAL ELEMENTS --- */
        .hero-image {
            width: 100%; height: 300px;
            background: url('https://images.unsplash.com/photo-1639322537228-f710d846310a?q=80&w=800') center/cover;
            position: relative; border-radius: 0 0 40px 40px;
        }

        .hero-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent, var(--bg));
        }

        .profile-section { text-align: center; margin-top: -60px; position: relative; z-index: 10; padding: 0 20px; }
        .avatar {
            width: 120px; height: 120px; border-radius: 40px;
            border: 4px solid var(--bg); object-fit: cover;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
        }

        /* --- BENTO GRID LINKS --- */
        .bento-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 25px 20px;
        }

        .bento-item {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 10px;
            backdrop-filter: blur(10px);
        }

        .bento-item:active { transform: scale(0.95); background: var(--primary); }
        .bento-item i { font-size: 1.8rem; }
        
        /* App Specific Colors */
        .fb i { color: #1877F2; }
        .ig i { color: #E4405F; }
        .li i { color: #0077B5; }
        .wa i { color: #25D366; }
        .tg i { color: #0088CC; }
        .yt i { color: #FF0000; }

        .wide { grid-column: span 2; flex-direction: row; justify-content: space-between; }

        /* --- IMAGES SECTION --- */
        .image-gallery { display: flex; gap: 10px; padding: 0 20px; overflow-x: auto; scrollbar-width: none; }
        .gallery-img { width: 140px; height: 180px; border-radius: 20px; object-fit: cover; flex-shrink: 0; }

        /* --- NAVIGATION --- */
        .nav-dock {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 380px; background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px); display: flex; padding: 12px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1); z-index: 1000; justify-content: space-around;
        }

        .nav-item { color: #64748b; text-decoration: none; font-size: 0.7rem; position: relative; z-index: 5; text-align: center; }
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 4px; transition: 0.3s; }
        .nav-item.active { color: white; }
        .nav-item.active i { transform: translateY(-5px); color: var(--primary); }

        /* --- PDF TEMP --- */
        #pdf-hide { position: absolute; left: -9999px; }
        .pdf-card { 
            width: 600px; height: 350px; background: #0f172a; color: white; padding: 40px; 
            border-radius: 20px; display: flex; flex-direction: column; justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="hero-image">
        <div class="hero-overlay"></div>
    </div>

    <div class="profile-section">
        <img src="https://i.ibb.co/QFqg9t90/1774726639870-jpg-1.jpg" class="avatar" alt="User">
        <h1 style="margin-top:15px; font-weight: 800; font-size: 1.8rem;">Future Nexus</h1>
        <p style="opacity: 0.6; font-size: 0.9rem;">The future is a baby. Let's grow it.</p>
    </div>

    <div style="padding: 20px 20px 0;">
        <button id="pdfBtn" onclick="savePDF()" class="bento-item wide" style="background: var(--primary); cursor: pointer; border: none;">
            <span><i class="fa-solid fa-file-pdf"></i> Save Digital Card (PDF)</span>
            <i class="fa-solid fa-chevron-right" style="font-size: 1rem;"></i>
        </button>
    </div>

    <div class="bento-grid">
        <a href="#" class="bento-item fb">
            <i class="fa-brands fa-facebook"></i>
            <span>Facebook</span>
        </a>
        <a href="#" class="bento-item ig">
            <i class="fa-brands fa-instagram"></i>
            <span>Instagram</span>
        </a>
        <a href="#" class="bento-item li">
            <i class="fa-brands fa-linkedin"></i>
            <span>LinkedIn</span>
        </a>
        <a href="#" class="bento-item wa">
            <i class="fa-brands fa-whatsapp"></i>
            <span>WhatsApp</span>
        </a>
        <a href="#" class="bento-item tg">
            <i class="fa-brands fa-telegram"></i>
            <span>Telegram</span>
        </a>
        <a href="#" class="bento-item yt">
            <i class="fa-brands fa-youtube"></i>
            <span>YouTube</span>
        </a>
        <a href="https://yourlink.com" class="bento-item wide" style="background: rgba(99, 102, 241, 0.1);">
            <i class="fa-solid fa-link" style="color: var(--primary);"></i>
            <span style="flex-grow: 1; margin-left: 15px;">Visit Official Website</span>
            <i class="fa-solid fa-arrow-up-right-from-square" style="font-size: 0.8rem; opacity: 0.5;"></i>
        </a>
    </div>

    <div class="section-title" style="padding: 10px 25px; font-weight: 800; opacity: 0.8;">INSIGHTS</div>
    <div class="image-gallery">
        <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=300" class="gallery-img">
        <img src="https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?q=80&w=300" class="gallery-img">
        <img src="https://images.unsplash.com/photo-1633356122544-f134324a6cee?q=80&w=300" class="gallery-img">
    </div>

    <nav class="nav-dock">
        <a href="#home" class="nav-item active"><i class="fa-solid fa-house-user"></i>Home</a>
        <a href="#social" class="nav-item"><i class="fa-solid fa-share-nodes"></i>Social</a>
        <a href="#gallery" class="nav-item"><i class="fa-solid fa-images"></i>Media</a>
        <a href="#more" class="nav-item"><i class="fa-solid fa-ellipsis"></i>More</a>
    </nav>

    <div id="pdf-hide">
        <div class="pdf-card" id="pdf-content">
            <div>
                <h1 style="font-size: 35px;">Future Nexus</h1>
                <p style="color: #6366f1; font-size: 20px;">Digital Identity Node</p>
            </div>
            <div style="display: flex; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                <p>nexus.future.io</p>
                <p>ID: 9988-7766-5544</p>
            </div>
        </div>
    </div>
</div>

<script>
    async function savePDF() {
        const btn = document.getElementById('pdfBtn');
        const element = document.getElementById('pdf-content');
        btn.innerHTML = '<span><i class="fa-solid fa-circle-notch fa-spin"></i> Coding PDF...</span>';

        const opt = {
            margin: 0,
            filename: 'Future-Nexus-Card.pdf',
            html2canvas: { scale: 3, useCORS: true },
            jsPDF: { unit: 'px', format: [600, 350], orientation: 'landscape' }
        };

        try {
            await html2pdf().set(opt).from(element).save();
            btn.innerHTML = '<span><i class="fa-solid fa-check"></i> PDF Saved</span>';
            btn.style.background = '#10b981';
        } catch (e) {
            btn.innerHTML = '<span>Error</span>';
        }
    }

    // Nav Switcher
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', function() {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            this.classList.add('active');
        });
    });
</script>

</body>
</html>
